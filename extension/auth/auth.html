<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Kolio – Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:  #034C8C;
      --teal:  #5A7E8C;
      --mist:  #819FA6;
      --cream: #F2F1DF;
      --gold:  #A68A56;
      --white: #ffffff;
      --ink:   #0d1f2d;
      --error: #c0392b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Motif de fond subtil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(3,76,140,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(166,138,86,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 48px 44px 40px;
      width: 440px;
      box-shadow: 0 2px 4px rgba(3,76,140,0.04),
                  0 12px 40px rgba(3,76,140,0.10);
      position: relative;
    }

    /* Bandeau couleur en haut */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--navy), var(--teal), var(--gold));
      border-radius: 20px 20px 0 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--navy);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.3px;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .hero-sub {
      font-size: 14px;
      color: var(--mist);
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* Onglets */
    .tabs {
      display: flex;
      background: var(--cream);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--mist);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--white);
      color: var(--navy);
      box-shadow: 0 1px 4px rgba(3,76,140,0.12);
    }

    /* Champs */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .label-optional {
      font-size: 10px;
      color: var(--mist);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 4px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e8e6d4;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: #fafaf5;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--navy);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(3,76,140,0.08);
    }

    input::placeholder { color: #b8b5a0; }

    .divider {
      border: none;
      border-top: 1px solid #ece9d8;
      margin: 20px 0 16px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--mist);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.02em;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .btn:hover::after { background: rgba(255,255,255,0.08); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { background: var(--mist); cursor: not-allowed; }

    .error {
      background: #fdf2f1;
      border: 1px solid #f0c5c1;
      color: var(--error);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success {
      background: #f0f7f0;
      border: 1px solid #b8ddb8;
      color: #1d6b1d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    #view-signup, #view-login { display: none; }
    #view-signup.active, #view-login.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <span class="logo-text">Kolio</span>
    </div>

    <h1 class="hero-title">Votre bibliothèque<br>de poche</h1>
    <p class="hero-sub">Convertissez le web en livres pour votre liseuse</p>

    <div class="tabs">
      <div class="tab active" id="tab-signup">Créer un compte</div>
      <div class="tab" id="tab-login">Se connecter</div>
    </div>

    <!-- SIGNUP -->
    <div id="view-signup" class="active">
      <div class="error" id="signup-error"></div>
      <div class="success" id="signup-success"></div>

      <div class="form-group">
        <label>Votre nom</label>
        <input type="text" id="signup-name" placeholder="Thomas" />
      </div>
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" id="signup-email" placeholder="thomas@email.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="signup-password" placeholder="••••••••" />
      </div>

      <hr class="divider">
      <p class="section-label">Liseuse <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--mist);font-size:10px">— facultatif, modifiable plus tard</span></p>

      <div class="form-group">
        <label>Adresse Kindle <span class="label-optional">(facultatif)</span></label>
        <input type="email" id="signup-kindle" placeholder="prenom_xxx@kindle.com" />
      </div>

      <button class="btn" id="btn-signup">Créer mon compte →</button>
    </div>

    <!-- LOGIN -->
    <div id="view-login">
      <div class="error" id="login-error"></div>
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" id="login-email" placeholder="thomas@email.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn" id="btn-login">Se connecter →</button>
      <p style="text-align:center; margin-top:14px; font-size:12px; color: var(--mist);">
        <span
          title="Fonctionnalité bientôt disponible"
          style="cursor:not-allowed; text-decoration:underline; text-decoration-style:dotted; opacity:0.55;"
        >Mot de passe oublié ?</span>
      </p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
