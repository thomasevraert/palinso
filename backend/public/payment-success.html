<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palinso – Paiement confirmé</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 2px 4px rgba(26,58,92,0.06), 0 12px 32px rgba(26,58,92,0.10);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #6b7f90;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .note {
      font-size: 12px;
      color: #a0b0bc;
      margin-top: 24px;
    }
    .countdown {
      font-size: 12px;
      color: #a0b0bc;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Paiement confirmé !</h1>
    <p>Ton abonnement Palinso Pro est maintenant actif.</p>
    <p>Tu peux fermer cet onglet et retourner sur l'extension.</p>
    <p class="note">Une confirmation t'a été envoyée par email.</p>
    <p class="countdown" id="countdown">Fermeture automatique dans 3 secondes…</p>
  </div>
  <script>
    let s = 3;
    const el = document.getElementById('countdown');
    const interval = setInterval(() => {
      s--;
      if (s <= 0) { clearInterval(interval); el.textContent = 'Fermeture…'; }
      else el.textContent = `Fermeture automatique dans ${s} seconde${s > 1 ? 's' : ''}…`;
    }, 1000);
  </script>
</body>
</html>
